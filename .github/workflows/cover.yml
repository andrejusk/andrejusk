name: cover

# Rebuilds assets/cover-{dark,light}.svg from tools/cover and commits them back if
# they changed. The build fetches the visits sparkline live from the public
# pixel.andrejus.dev /ticker API — on push and on a weekly schedule, so the
# sparkline tracks the last few months of profile visits.

on:
  push:
    branches: [main]
    paths:
      - "tools/cover/**"
      - ".github/workflows/cover.yml"
  schedule:
    # the /ticker visit buckets are 7 days aligned to Thursday 00:00 UTC, so the
    # 13-complete-week window only changes after a Thursday. Rebuild just after that
    # boundary so a freshly-completed week shows up promptly (instead of next Monday).
    - cron: "30 0 * * 4" # weekly (Thu 00:30 UTC) — just after the visit bucket rolls
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: tools/cover/package-lock.json

      - name: Install
        working-directory: tools/cover
        run: npm ci

      - name: Build covers
        working-directory: tools/cover
        run: npm run build
        env:
          # fetch visits live; fail (don't overwrite a good cover) if the API is down
          COVER_REQUIRE_VISITS: "1"

      - name: Commit if changed
        run: |
          if git diff --quiet -- assets/ README.md; then
            echo "covers are up to date."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add assets/cover-dark.svg assets/cover-light.svg README.md
            git commit -m "chore: rebuild covers [skip ci]"
            git push
          fi
